version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# AUTONORME — Docker Compose (Développement local)
# Démarre : PostgreSQL 16 + Redis 7 + pgAdmin
# Usage : docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: autonorme_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: autonorme
      POSTGRES_PASSWORD: autonorme_dev_password
      POSTGRES_DB: autonorme_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autonorme -d autonorme_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autonorme_network

  # ── Redis 7 (Cache + BullMQ) ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: autonorme_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass "autonorme_redis_dev"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "autonorme_redis_dev", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autonorme_network

  # ── pgAdmin 4 (Interface PostgreSQL) ──────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: autonorme_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@autonorme.com
      PGADMIN_DEFAULT_PASSWORD: autonorme_admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - autonorme_network

# ── Volumes persistants ────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

# ── Réseau interne ─────────────────────────────────────────────────────────
networks:
  autonorme_network:
    driver: bridge
