name: CI — AUTONORME

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '22'
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: autonorme

jobs:
  # ── Lint & TypeCheck ────────────────────────────────────────────────────────
  lint:
    name: Lint & TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (Turborepo)
        run: npm run lint

  # ── Tests Backend ───────────────────────────────────────────────────────────
  test-api:
    name: Tests API (NestJS)
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: autonorme
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: autonorme_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate --workspace=@autonorme/database
        env:
          DATABASE_URL: postgresql://autonorme:test_password@localhost:5432/autonorme_test

      - name: Run migrations
        run: npx prisma migrate deploy --schema=packages/database/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://autonorme:test_password@localhost:5432/autonorme_test

      - name: Run tests
        run: npm run test --workspace=@autonorme/api
        env:
          DATABASE_URL: postgresql://autonorme:test_password@localhost:5432/autonorme_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          JWT_ACCESS_SECRET: test_access_secret_min_32_characters
          JWT_REFRESH_SECRET: test_refresh_secret_min_32_characters

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: apps/api/coverage/lcov.info
          flags: api

  # ── Build Web ───────────────────────────────────────────────────────────────
  build-web:
    name: Build Web (Next.js)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --workspace=@autonorme/web
        env:
          NEXT_PUBLIC_API_URL: https://api.autonorme.com/api/v1
          NEXT_PUBLIC_APP_URL: https://autonorme.com
